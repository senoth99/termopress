<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Производственное задание</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --danger: #dc2626;
      --danger-hover: #b91c1c;
      --ok: #059669;
      --error: #b91c1c;
      --radius: 14px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.4;
    }

    .container {
      max-width: 920px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: 0 10px 30px rgba(31, 41, 55, 0.06);
    }

    h1 {
      margin: 0 0 18px;
      font-size: clamp(22px, 4vw, 30px);
    }

    .rows {
      display: grid;
      gap: 12px;
      margin-bottom: 16px;
    }

    .item-row {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      background: #fff;
      display: grid;
      gap: 10px;
      align-items: end;
      grid-template-columns: 1.6fr 1fr 1fr auto;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field label {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 15px;
      color: var(--text);
      background: #fff;
    }

    input:focus {
      outline: 2px solid #bfdbfe;
      outline-offset: 1px;
      border-color: #93c5fd;
    }

    .btn {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.15s ease, opacity 0.15s ease;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
    }

    .btn-secondary {
      background: #eef2ff;
      color: #3730a3;
    }

    .btn-secondary:hover {
      background: #e0e7ff;
    }

    .btn-danger {
      background: #fee2e2;
      color: var(--danger);
    }

    .btn-danger:hover {
      background: #fecaca;
      color: var(--danger-hover);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 8px;
    }

    .status {
      min-height: 24px;
      margin-top: 14px;
      font-weight: 600;
      font-size: 14px;
    }

    .status.ok {
      color: var(--ok);
    }

    .status.error {
      color: var(--error);
    }

    @media (max-width: 780px) {
      .item-row {
        grid-template-columns: 1fr;
      }

      .item-row .remove-wrap {
        justify-self: start;
      }

      .btn {
        width: 100%;
      }

      .actions .btn {
        width: auto;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>Производственное задание</h1>

      <div id="rows" class="rows"></div>

      <div class="actions">
        <button id="addRowBtn" class="btn btn-secondary" type="button">+ Добавить позицию</button>
        <button id="submitBtn" class="btn btn-primary" type="button">Отправить производственное задание</button>
      </div>

      <div id="status" class="status" aria-live="polite"></div>
    </section>
  </main>

  <script>
    const WEBHOOK_URL = "СЮДА_ВСТАВИТЬ_ССЫЛКУ_ВЕБХУКА";

    const rowsContainer = document.getElementById("rows");
    const addRowBtn = document.getElementById("addRowBtn");
    const submitBtn = document.getElementById("submitBtn");
    const statusBox = document.getElementById("status");

    const createRow = (prefill = {}) => {
      const row = document.createElement("div");
      row.className = "item-row";

      row.innerHTML = `
        <div class="field">
          <label>Название</label>
          <input type="text" class="name-input" placeholder="Например, Футболка CASHER" value="${prefill.name || ""}">
        </div>
        <div class="field">
          <label>Размер</label>
          <input type="text" class="size-input" placeholder="Например, M" value="${prefill.size || ""}">
        </div>
        <div class="field">
          <label>Количество</label>
          <input type="number" min="1" step="1" class="quantity-input" placeholder="0" value="${Number.isFinite(prefill.quantity) ? prefill.quantity : ""}">
        </div>
        <div class="remove-wrap">
          <button type="button" class="btn btn-danger remove-btn">Удалить</button>
        </div>
      `;

      const removeBtn = row.querySelector(".remove-btn");
      removeBtn.addEventListener("click", () => removeRow(row));

      return row;
    };

    const removeRow = (row) => {
      const allRows = Array.from(rowsContainer.querySelectorAll(".item-row"));

      if (allRows.length > 1) {
        row.remove();
        return;
      }

      const nameInput = row.querySelector(".name-input");
      const sizeInput = row.querySelector(".size-input");
      const quantityInput = row.querySelector(".quantity-input");

      nameInput.value = "";
      sizeInput.value = "";
      quantityInput.value = "";
    };

    const addRow = (prefill = {}) => {
      rowsContainer.appendChild(createRow(prefill));
    };

    const showStatus = (message, type) => {
      statusBox.textContent = message;
      statusBox.className = `status ${type}`;
    };

    const collectItems = () => {
      const rows = Array.from(rowsContainer.querySelectorAll(".item-row"));

      return rows
        .map((row) => {
          const name = row.querySelector(".name-input").value.trim();
          const size = row.querySelector(".size-input").value.trim();
          const quantityRaw = row.querySelector(".quantity-input").value.trim();

          if (!name && !size && !quantityRaw) {
            return null;
          }

          const quantity = Number(quantityRaw);

          return {
            name,
            size,
            quantity: Number.isFinite(quantity) ? quantity : 0,
          };
        })
        .filter(Boolean);
    };

    const sendProductionOrder = async () => {
      const items = collectItems();

      if (items.length === 0) {
        showStatus("Заполните хотя бы одну позицию", "error");
        return;
      }

      if (!WEBHOOK_URL || WEBHOOK_URL.includes("СЮДА_ВСТАВИТЬ_ССЫЛКУ_ВЕБХУКА")) {
        showStatus("Укажите WEBHOOK_URL в коде перед отправкой", "error");
        return;
      }

      submitBtn.disabled = true;
      submitBtn.style.opacity = "0.7";

      try {
        const response = await fetch(WEBHOOK_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ items }),
        });

        if (!response.ok) {
          throw new Error("Request failed");
        }

        showStatus("Производственное задание отправлено", "ok");
      } catch (error) {
        showStatus("Ошибка отправки", "error");
      } finally {
        submitBtn.disabled = false;
        submitBtn.style.opacity = "1";
      }
    };

    addRow();

    addRowBtn.addEventListener("click", () => addRow());
    submitBtn.addEventListener("click", sendProductionOrder);
  </script>
</body>
</html>
